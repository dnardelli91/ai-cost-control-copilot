<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Cost Control Copilot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    h1 { font-size: 28px; color: #38bdf8; }
    .badge { background: #1e293b; padding: 6px 12px; border-radius: 20px; font-size: 12px; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .card { background: #1e293b; border-radius: 12px; padding: 24px; border: 1px solid #334155; }
    .card h2 { font-size: 14px; color: #94a3b8; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .card .value { font-size: 32px; font-weight: 700; color: #38bdf8; }
    .card .sub { font-size: 14px; color: #64748b; margin-top: 4px; }
    
    .budget-bar { height: 8px; background: #334155; border-radius: 4px; margin: 16px 0; overflow: hidden; }
    .budget-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
    .budget-fill.ok { background: #22c55e; }
    .budget-fill.warning { background: #f59e0b; }
    .budget-fill.critical { background: #ef4444; }
    
    .providers-table { width: 100%; border-collapse: collapse; }
    .providers-table th { text-align: left; padding: 12px; color: #64748b; font-weight: 500; font-size: 12px; }
    .providers-table td { padding: 12px; border-top: 1px solid #334155; }
    .providers-table tr:hover { background: #273548; }
    
    .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    .alert.critical { background: #7f1d1d; border: 1px solid #ef4444; }
    .alert.warning { background: #78350f; border: 1px solid #f59e0b; }
    .alert.info { background: #1e3a5f; border: 1px solid #38bdf8; }
    .alert-dot { width: 8px; height: 8px; border-radius: 50%; }
    .alert-dot.critical { background: #ef4444; }
    .alert-dot.warning { background: #f59e0b; }
    .alert-dot.info { background: #38bdf8; }
    
    .forecast { display: flex; gap: 20px; flex-wrap: wrap; }
    .forecast-item { flex: 1; min-width: 150px; }
    .forecast-item .label { font-size: 12px; color: #64748b; }
    .forecast-item .val { font-size: 20px; font-weight: 600; }
    .trend-up { color: #ef4444; }
    .trend-down { color: #22c55e; }
    
    .actions { display: flex; gap: 10px; margin-bottom: 20px; }
    .btn { padding: 10px 20px; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .btn:hover { background: #0ea5e9; }
    
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🤖 AI Cost Control Copilot</h1>
      <span class="badge">MVP v1.0</span>
    </header>
    
    <div class="actions">
      <button class="btn" onclick="refreshData()">🔄 Refresh</button>
      <button class="btn" onclick="testAlert()">🧪 Test Alert</button>
    </div>
    
    <div class="grid">
      <div class="card">
        <h2>Total Monthly Cost</h2>
        <div class="value" id="totalCost">$0.00</div>
        <div class="sub" id="totalTokens">0 tokens</div>
      </div>
      <div class="card">
        <h2>Budget Status</h2>
        <div class="value" id="budgetPercent">0%</div>
        <div class="sub" id="budgetRemaining">$0.00 remaining</div>
        <div class="budget-bar"><div class="budget-fill" id="budgetBar"></div></div>
      </div>
      <div class="card">
        <h2>Forecast (Next Month)</h2>
        <div class="value" id="forecastNext">$0.00</div>
        <div class="sub" id="forecastTrend">--</div>
      </div>
    </div>
    
    <div class="grid">
      <div class="card">
        <h2>Costs by Provider</h2>
        <table class="providers-table">
          <thead><tr><th>Provider</th><th>Tokens</th><th>Cost</th><th>%</th></tr></thead>
          <tbody id="providersBody"></tbody>
        </table>
      </div>
      <div class="card">
        <h2>Active Alerts</h2>
        <div id="alertsList">
          <div class="alert info"><span class="alert-dot info"></span> Loading...</div>
        </div>
      </div>
    </div>
    
    <div class="card">
      <h2>Quarterly Forecast</h2>
      <div class="forecast">
        <div class="forecast-item"><div class="label">Current Monthly</div><div class="val" id="fcCurrent">--</div></div>
        <div class="forecast-item"><div class="label">Next Month</div><div class="val" id="fcNext">--</div></div>
        <div class="forecast-item"><div class="label">End of Quarter</div><div class="val" id="fcQuarter">--</div></div>
        <div class="forecast-item"><div class="label">Trend</div><div class="val" id="fcTrend">--</div></div>
      </div>
    </div>
  </div>
  
  <script>
    const API = '/api/costs';
    
    async function refreshData() {
      try {
        const [dash, budget, alerts, forecast] = await Promise.all([
          fetch(`${API}/dashboard`).then(r => r.json()),
          fetch(`${API}/budget`).then(r => r.json()),
          fetch(`${API}/alerts`).then(r => r.json()),
          fetch(`${API}/forecast`).then(r => r.json())
        ]);
        
        // Dashboard
        document.getElementById('totalCost').textContent = `$${dash.summary.totalCost}`;
        document.getElementById('totalTokens').textContent = `${(dash.summary.totalTokens/1000000).toFixed(1)}M tokens`;
        
        // Budget
        document.getElementById('budgetPercent').textContent = `${budget.percentage}%`;
        document.getElementById('budgetRemaining').textContent = `$${budget.remaining} remaining`;
        const bar = document.getElementById('budgetBar');
        bar.style.width = `${budget.percentage}%`;
        bar.className = `budget-fill ${budget.status}`;
        
        // Providers
        document.getElementById('providersBody').innerHTML = dash.providers.map(p => 
          `<tr><td>${p.name}</td><td>${(p.tokens/1000).toFixed(0)}k</td><td>$${p.cost.toFixed(2)}</td><td>${p.percentage}%</td></tr>`
        ).join('');
        
        // Alerts
        document.getElementById('alertsList').innerHTML = alerts.length ? alerts.map(a => 
          `<div class="alert ${a.severity}"><span class="alert-dot ${a.severity}"></span>${a.message}</div>`
        ).join('') : '<div class="alert info"><span class="alert-dot info"></span>No active alerts</div>';
        
        // Forecast
        document.getElementById('forecastNext').textContent = `$${forecast.forecastNextMonth}`;
        document.getElementById('forecastTrend').textContent = `${forecast.trend} (${forecast.trendPercentage}%)`;
        document.getElementById('fcCurrent').textContent = `$${forecast.currentMonthly}`;
        document.getElementById('fcNext').textContent = `$${forecast.forecastNextMonth}`;
        document.getElementById('fcQuarter').textContent = `$${forecast.forecastEndOfQuarter}`;
        document.getElementById('fcTrend').innerHTML = forecast.trend === 'increasing' 
          ? '<span class="trend-up">↑ Up</span>' : '<span class="trend-down">↓ Down</span>';
      } catch(e) {
        console.error('Error:', e);
      }
    }
    
    async function testAlert() {
      await fetch(`${API}/costs`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({provider: 'test', tokens: 100000, cost: 5.00})
      });
      refreshData();
    }
    
    refreshData();
  </script>
</body>
</html>
